# Mechanism tags registry
#
# Controlled vocabulary for `mechanism_tags` in setup metadata
# (config/configuration.json setups.<name>.mechanism_tags).
#
# Per spec docs/superpowers/specs/2026-05-19-walk-forward-methodology-design.md.
# Adding a tag requires updating this file + brief justification in commit
# message + (eventually) live-computable predicate for runtime gating.
#
# Schema per tag:
#   description: free-text
#   source: where the data comes from
#   live_computable: bool (true if can be evaluated at runtime)

tags:
  # FII / FPI flow regimes — depend on data/fii_flow/ scraper (separate work)
  FII_net_flow_positive_30d:
    description: "FII net equity flow positive over trailing 30 calendar days"
    source: "NSDL FPI flow data (data/fii_flow/)"
    live_computable: true
  FII_net_flow_negative_30d:
    description: "FII net equity flow negative over trailing 30 calendar days"
    source: "NSDL FPI flow data (data/fii_flow/)"
    live_computable: true
  FII_net_flow_positive_60d:
    description: "FII net equity flow positive over trailing 60 calendar days"
    source: "NSDL FPI flow data (data/fii_flow/)"
    live_computable: true

  # SEBI regulatory regimes — discrete one-way transitions
  SEBI_FO_rule_version_1:
    description: "Pre-Oct 2024 F&O regime: multi-index weekly expiries, smaller lots"
    source: "data/sebi_calendar/rule_changes.csv"
    live_computable: true
  SEBI_FO_rule_version_2:
    description: "Post-Nov 2024 F&O regime: 1 weekly per exchange, 3x lot sizes"
    source: "data/sebi_calendar/rule_changes.csv"
    live_computable: true
  MWPL_formula_pre_2025_10:
    description: "MWPL utilization formula before Oct 2025 revision"
    source: "data/sebi_calendar/rule_changes.csv"
    live_computable: true
  MWPL_formula_post_2025_10:
    description: "MWPL utilization formula after Oct 2025 revision"
    source: "data/sebi_calendar/rule_changes.csv"
    live_computable: true

  # Volatility regimes — derived from India VIX feed
  VIX_above_20:
    description: "India VIX above 20 (elevated volatility regime)"
    source: "NSE India VIX feed"
    live_computable: true
  VIX_below_15:
    description: "India VIX below 15 (low volatility regime)"
    source: "NSE India VIX feed"
    live_computable: true

  # Macro / event regimes — some manual flags, some computed
  war_volatility_active:
    description: "India geopolitical conflict elevated-volatility regime; manual flag set in assets/macro_regime_calendar.yaml"
    source: "Manual flag (assets/macro_regime_calendar.yaml)"
    live_computable: true
  midcap_correction_active:
    description: "Nifty Midcap 150 drawdown > 15% from trailing 60d high"
    source: "Computed from sectoral index data"
    live_computable: true
  election_period_active:
    description: "Lok Sabha or major state election within ±2 weeks"
    source: "Manual flag (assets/macro_regime_calendar.yaml)"
    live_computable: true

  # Illiquid intraday over-extension → reversion family (sub-project #9).
  # Behavioral/structural mechanisms, not regulatory regimes. Pre-registered
  # 2026-06-03 for panic_crash_revert_long + up_spike_fade_short (briefs in
  # specs/2026-06-03-brief-*.md). live_computable=false: these describe the
  # edge thesis, not a runtime-gated regime flag.
  capitulation_overshoot:
    description: "Forced/panic selling (stop cascades, MIS square-off, margin calls) over-shoots fair value in a thin order book; price snaps back intraday. Depth-gated: only deep (<=-7% / 15min) capitulations revert; shallow dips continue."
    source: "Behavioral/microstructure thesis (sub9 T5 down-spike bounce)"
    live_computable: false
  retail_panic:
    description: "Fear-driven retail selling in under-covered small/micro-caps with no analyst coverage; sells into a liquidity vacuum."
    source: "Behavioral thesis"
    live_computable: false
  retail_fomo_exhaustion:
    description: "Momentum-chasing retail drives an intraday up-spike in a thin name; buying exhausts and the spike fades into the close."
    source: "Behavioral thesis (sub9 T1 up-spike fade)"
    live_computable: false
  intraday_overshoot:
    description: "Price over-extends beyond fair value intraday because illiquidity prevents institutional supply/demand from arresting the move; mean-reverts once the flow exhausts."
    source: "Microstructure thesis"
    live_computable: false
  illiquidity_premium:
    description: "Structural thinness of small/micro/unknown-cap order books is the permanent moat that both allows the over-shoot and keeps institutions out (not arbitrage-scalable)."
    source: "Microstructure thesis"
    live_computable: false

  # Explicit no-dependency declaration — for setups whose mechanism is
  # genuinely rule-orthogonal (no F&O, no FII flow, no SEBI regulatory
  # dependency). Documenting this explicitly is preferable to leaving
  # mechanism_tags empty (which the validator would refuse).
  rule_orthogonal:
    description: "Setup has NO known external mechanism dependency. Edge is independent of F&O rules, FII flows, regulatory regime, sectoral correlations. Use sparingly — most Indian equity setups have at least one regime dependency on close inspection."
    source: "Explicit researcher declaration"
    live_computable: true
